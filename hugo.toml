baseURL = "https://aashishh1.github.io/Blogs/"
languageCode = "en-us"
title = "આશિષ Mishra"
theme = "PaperMod"
paginate = 10

enableRobotsTXT = true

[pagination]
pagerSize = 10

[minify]
disableXML = true

[outputs]
home = ["HTML", "RSS", "JSON"]

[params]
env = "production"
title = "આશિષ Mishra"
description = "AI Engineer sharing insights on Machine Learning, Data Science, MLOps, and Generative AI."
keywords = [
"AI Engineer",
"Machine Learning",
"Data Science",
"Generative AI",
"MLOps"
]
author = "Ashish Mishra"

defaultTheme = "auto"
disableThemeToggle = false

ShowReadingTime = false
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = false
ShowToc = false
TocOpen = false

[params.homeInfoParams]
Title = "Hi, I'm Ashish Mishra 👋"
Content = "AI Engineer building intelligent systems with Machine Learning and Generative AI. I write about the architecture and ideas behind modern AI."

[[params.socialIcons]]
name = "github"
url = "https://github.com/aashishh1"

[[params.socialIcons]]
name = "linkedin"
url = "https://www.linkedin.com/in/aashishh1/"

[[params.socialIcons]]
name = "x"
url = "https://x.com/imAMishra1"


[params.cover]
hidden = false
hiddenInList = false
hiddenInSingle = false

[params.assets]
favicon = "/favicon.ico"

[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 20

[markup]
[markup.highlight]
style = "monokai"

[markup.goldmark.renderer]
unsafe = true

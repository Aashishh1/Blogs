baseURL = "https://aashishh1.github.io/Blogs/"
locale = "en-us"
title = "આશિષ Mishra"
theme = "PaperMod"
copyright = "© 2026 Ashish Mishra"

enableRobotsTXT = true

[pagination]
pagerSize = 10

[minify]
disableXML = true

[outputs]
home = ["HTML", "RSS", "JSON"]

[taxonomies]
tag = "tags"

[params]
env = "production"
title = "આશિષ Mishra"
description = "Technical notes on production AI systems, machine learning, LLM applications, data science, and MLOps."
keywords = [
  "AI Engineer",
  "Machine Learning",
  "Data Science",
  "Generative AI",
  "MLOps",
]
author = "Ashish Mishra"

defaultTheme = "auto"
disableThemeToggle = false

ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = false
ShowToc = false
TocOpen = false

[params.homeInfoParams]
Title = "Hi, I'm Ashish Mishra 👋"
Content = "I build and explore AI-powered systems using Machine Learning, Large Language Models, RAG, AI Agents, and cloud-native technologies. Through this blog, I share technical insights, implementation notes, experiments, and lessons learned while building production-ready AI applications."

[[params.socialIcons]]
name = "github"
url = "https://github.com/Aashishh1"

[[params.socialIcons]]
name = "linkedin"
url = "https://www.linkedin.com/in/aashishh1/"

[[params.socialIcons]]
name = "x"
url = "https://x.com/imAMishra1"

[params.cover]
hidden = false
hiddenInList = false
hiddenInSingle = false

[params.assets]
favicon = "favicon.ico"

[[menu.main]]
identifier = "posts"
name = "Posts"
url = "posts/"
weight = 10

[[menu.main]]
identifier = "about"
name = "About"
url = "about/"
weight = 20

[markup]

[markup.highlight]
